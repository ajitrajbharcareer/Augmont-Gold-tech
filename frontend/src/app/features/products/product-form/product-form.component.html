<div class="page-container" style="max-width:560px">
  <h1>{{ isEdit ? 'Edit Product' : 'Create Product' }}</h1>
  <mat-card style="padding:24px">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Product Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. Gold Ring 22K">
        <mat-error>Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Price (INR)</mat-label>
        <span matPrefix>₹&nbsp;</span>
        <input matInput type="number" formControlName="price" min="0">
        <mat-error>Valid price is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category_id">
          <mat-option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</mat-option>
        </mat-select>
        <mat-error>Category is required</mat-error>
      </mat-form-field>

      <div style="margin-bottom:16px">
        <label style="display:block;margin-bottom:8px;color:#555">Product Image</label>
        <input type="file" accept="image/*" (change)="onImageChange($event)">
        <div *ngIf="imagePreview" style="margin-top:12px">
          <img [src]="imagePreview" style="max-width:200px;max-height:200px;object-fit:cover;border-radius:4px;border:1px solid #ddd">
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button mat-button type="button" routerLink="/products">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
          {{ saving ? 'Saving...' : (isEdit ? 'Update Product' : 'Create Product') }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
