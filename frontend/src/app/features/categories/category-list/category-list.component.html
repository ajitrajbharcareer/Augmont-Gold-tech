<div class="page-container">
  <div class="page-header">
    <h1>Categories</h1>
    <button mat-raised-button color="primary" routerLink="/categories/new">+ Add Category</button>
  </div>

  <mat-card>
    <div class="table-wrapper" [class.loading]="loading">
      <mat-spinner *ngIf="loading" diameter="40"></mat-spinner>
      <table mat-table [dataSource]="categories" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let c">{{ c.description || '—' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let c">
            <span [style.color]="c.is_active ? 'green' : 'red'">{{ c.is_active ? 'Active' : 'Inactive' }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let c">
            <button mat-icon-button color="primary" [routerLink]="['/categories/edit', c.id]">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="delete(c.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="4">No categories found. Create one!</td>
        </tr>
      </table>
    </div>
  </mat-card>
</div>
